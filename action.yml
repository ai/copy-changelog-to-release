name: Copy ChangeLog to Release
description: Create GitHub Releases based on latest record in `CHANGELOG.md` file.
author: Andrey Sitnik

inputs:
  latest:
    description: Mark this release as the latest release. Set to `false` to skip the `latest` tag.
    required: false
    default: 'true'

runs:
  using: node24
  main: action.js
